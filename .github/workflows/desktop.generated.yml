name: 'Release: Step 3 - Desktop'
'on':
      workflow_call:
            inputs:
                  release_version:
                        required: true
                        type: string
                        description: Resolved release version
                  release_tag:
                        required: true
                        type: string
                        description: Resolved release tag
                  release_commit:
                        required: true
