name: "Release: Step 1 - Prepare"
"on": 
  workflow_call: 
    inputs: 
      version_number: 
        required: false
        type: string
        description: Optional release version in *.*.* format.
    outputs: 
      current_version: 
        description: Current version from packages/polywise/package.json
        value: "${{ jobs.prepare.outputs.current_version }}"
      release_version: 
        description: Resolved release version
        value: "${{ jobs.prepare.outputs.release_version }}"
      release_tag: 
        description: Resolved release tag
        value: "${{ jobs.prepare.outputs.release_tag }}"
      previous_tag: 
        description: Previous release tag
        value: "${{ jobs.prepare.outputs.previous_tag }}"
      release_commit: 
        description: Release commit persisted to the repository
        value: "${{ jobs.prepare.outputs.release_commit }}"
concurrency: 
  group: "prepare-release-${{ github.run_id }}"
  cancel-in-progress: false
permissions: 
  contents: write
jobs: 
  prepare: 
    runs-on: ubuntu-latest
    outputs: 
      current_version: "${{ steps.version.outputs.current_version }}"
      release_version: "${{ steps.version.outputs.release_version }}"
      release_tag: "${{ steps.version.outputs.release_tag }}"
      previous_tag: "${{ steps.version.outputs.previous_tag }}"
      release_commit: "${{ steps.persist.outputs.release_commit }}"
    steps: 
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0
          ref: build
      - uses: actions/setup-node@v6
      - name: Fetch tags
        run: git fetch --tags -f
      - name: Sync build branch with latest master
        shell: bash
        run: "git fetch origin master build --tags -f\ngit checkout build\ngit reset --hard origin/master"
      - name: Resolve release version
        id: version
        shell: bash
        env: 
          INPUT_VERSION: "${{ inputs.version_number }}"
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: node ./scripts/resolve_release_version.mjs
      - name: Apply release version to repository files
        shell: bash
        env: 
          RELEASE_VERSION: "${{ steps.version.outputs.release_version }}"
        run: node ./scripts/apply_release_version.mjs
      - name: Collect commits
        id: commits
        shell: bash
        env: 
          PREVIOUS_TAG: "${{ steps.version.outputs.previous_tag }}"
          RELEASE_COMMIT: HEAD
        run: node ./scripts/collect_release_commits.mjs
      - name: Commit and push release version
        id: persist
        shell: bash
        env: 
          RELEASE_VERSION: "${{ steps.version.outputs.release_version }}"
        run: "git config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\ngit add packages/polywise/package.json packages/app/package.json packages/desktop/package.json\nif ! git diff --cached --quiet; then\n\tgit commit -m \"chore(release): v${RELEASE_VERSION}\"\n\tgit push origin HEAD:build\n\tgit push origin HEAD:master\nfi\necho \"release_commit=$(git rev-parse HEAD)\" >> \"$GITHUB_OUTPUT\""
      - name: Generate release notes
        shell: bash
        env: 
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          RELEASE_TAG: "${{ steps.version.outputs.release_tag }}"
          PREVIOUS_TAG: "${{ steps.version.outputs.previous_tag }}"
        run: node ./scripts/generate_release_notes.mjs
      - name: Create or update draft release
        id: create_release
        shell: bash
        env: 
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          RELEASE_TAG: "${{ steps.version.outputs.release_tag }}"
          RELEASE_COMMIT: "${{ steps.persist.outputs.release_commit }}"
        run: "set +e\ncreate_output=$(gh release create \"$RELEASE_TAG\" --draft --title \"$RELEASE_TAG\" --target \"$RELEASE_COMMIT\" --notes-file release-notes.md 2>&1)\ncreate_status=$?\nset -e\nif [ \"$create_status\" -ne 0 ]; then\n\tif printf '%s' \"$create_output\" | grep -qi 'already exists'; then\n\t\tgh release edit \"$RELEASE_TAG\" --draft --title \"$RELEASE_TAG\" --target \"$RELEASE_COMMIT\" --notes-file release-notes.md >/dev/null\n\telse\n\t\tprintf '%s\\n' \"$create_output\" >&2\n\t\texit \"$create_status\"\n\tfi\nfi\nrelease_row=$(gh api \"repos/${{ github.repository }}/releases?per_page=10\" --jq '.[] | select(.tag_name == env.RELEASE_TAG and .draft == true) | \"\\(.id)\\t\\(.html_url)\"' | head -n 1)\n[ -n \"$release_row\" ]\nrelease_id=\"${release_row%%$'\\t'*}\"\nrelease_url=\"${release_row#*$'\\t'}\"\necho \"id=${release_id}\" >> \"$GITHUB_OUTPUT\"\necho \"url=${release_url}\" >> \"$GITHUB_OUTPUT\""
      - name: Verify draft release outputs
        shell: bash
        run: "release_id=\"${{ steps.create_release.outputs.id }}\"\nrelease_url=\"${{ steps.create_release.outputs.url }}\"\n[ -n \"$release_id\" ]\n[ -n \"$release_url\" ]"
