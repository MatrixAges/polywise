name: "Release: Step 1 - Prepare"
"on": 
  workflow_call: 
    inputs: 
      version_number: 
        required: false
        type: string
        description: Optional release version in *.*.* format.
    outputs: 
      current_version: 
        description: Current version from packages/polywise/package.json
        value: "${{ jobs.prepare.outputs.current_version }}"
      release_version: 
        description: Resolved release version
        value: "${{ jobs.prepare.outputs.release_version }}"
      release_tag: 
        description: Resolved release tag
        value: "${{ jobs.prepare.outputs.release_tag }}"
      previous_tag: 
        description: Previous release tag
        value: "${{ jobs.prepare.outputs.previous_tag }}"
      release_commit: 
        description: Release commit persisted to the repository
        value: "${{ jobs.prepare.outputs.release_commit }}"
concurrency: 
  group: "prepare-release-${{ github.run_id }}"
  cancel-in-progress: false
permissions: 
  contents: write
jobs: 
  prepare: 
    runs-on: ubuntu-latest
    outputs: 
      current_version: "${{ steps.version.outputs.current_version }}"
      release_version: "${{ steps.version.outputs.release_version }}"
      release_tag: "${{ steps.version.outputs.release_tag }}"
      previous_tag: "${{ steps.version.outputs.previous_tag }}"
      release_commit: "${{ steps.persist.outputs.release_commit }}"
    steps: 
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0
          ref: build
      - uses: actions/setup-node@v6
      - name: Fetch tags
        run: git fetch --tags -f
      - name: Sync build branch with latest master
        shell: bash
        run: "git fetch origin master build --tags -f\ngit checkout build\ngit reset --hard origin/build\ngit pull --no-rebase origin master"
      - name: Resolve release version
        id: version
        shell: bash
        env: 
          INPUT_VERSION: "${{ inputs.version_number }}"
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: node ./scripts/resolve_release_version.mjs
      - name: Apply release version to repository files
        shell: bash
        env: 
          RELEASE_VERSION: "${{ steps.version.outputs.release_version }}"
        run: node ./scripts/apply_release_version.mjs
      - name: Collect commits
        id: commits
        shell: bash
        env: 
          PREVIOUS_TAG: "${{ steps.version.outputs.previous_tag }}"
          RELEASE_COMMIT: HEAD
        run: node ./scripts/collect_release_commits.mjs
      - name: Commit and push release version
        id: persist
        shell: bash
        env: 
          RELEASE_VERSION: "${{ steps.version.outputs.release_version }}"
        run: "git config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\ngit add packages/polywise/package.json packages/app/package.json packages/desktop/package.json\nif ! git diff --cached --quiet; then\n\tgit commit -m \"chore(release): v${RELEASE_VERSION}\"\n\tgit push origin HEAD:build\n\tgit push origin HEAD:master\nfi\necho \"release_commit=$(git rev-parse HEAD)\" >> \"$GITHUB_OUTPUT\""
      - name: Generate release notes
        shell: bash
        env: 
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          RELEASE_TAG: "${{ steps.version.outputs.release_tag }}"
          PREVIOUS_TAG: "${{ steps.version.outputs.previous_tag }}"
        run: node ./scripts/generate_release_notes.mjs
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with: 
          draft: true
          tag_name: "${{ steps.version.outputs.release_tag }}"
          name: "${{ steps.version.outputs.release_tag }}"
          target_commitish: "${{ steps.persist.outputs.release_commit }}"
          body_path: release-notes.md
      - name: Verify draft release is visible
        shell: bash
        env: 
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: "target_tag=\"${{ steps.version.outputs.release_tag }}\"\nrelease_is_draft=\"\"\nfor attempt in 1 2 3 4 5 6; do\n\trelease_is_draft=$(gh api \"repos/${{ github.repository }}/releases?per_page=2\" 2>/dev/null | jq -r --arg tag \"$target_tag\" 'map(select(.tag_name == $tag)) | .[0].draft // empty')\n\t[ -n \"$release_is_draft\" ] && break\n\techo \"Draft release ${target_tag} is not visible yet. attempt=${attempt}\"\n\tsleep 10\ndone\n[ \"$release_is_draft\" = \"true\" ]"
