name: Publish NPM Package
'on':
      workflow_call:
            inputs:
                  release_version:
                        required: true
                        type: string
                        description: Resolved release version
                  release_tag:
                        required: true
                        type: string
                        description: Resolved release tag
concurrency:
      group: 'publish-npm-${{ github.run_id }}'
      cancel-in-progress: false
permissions:
      contents: read
      id-token: write
jobs:
      publish:
            runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v5
                    with:
                          fetch-depth: 0
                  - uses: actions/setup-node@v4
                    with:
                          node-version: 22.12.0
                          cache: pnpm
                          cache-dependency-path: pnpm-lock.yaml
                          registry-url: https://registry.npmjs.org
                  - name: Setup pnpm
                    uses: pnpm/action-setup@v4
                    with:
                          version: 11.3.0
                          run_install: false
                  - name: Setup Bun
                    uses: oven-sh/setup-bun@v2
                    with:
                          bun-version: 1.3.14
                  - name: Apply release version
                    shell: bash
                    env:
                          RELEASE_VERSION: '${{ inputs.release_version }}'
                    run: node ./scripts/apply_release_version.mjs
                  - name: Verify draft release exists
                    shell: bash
                    env:
                          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
                    run: 'gh release view "${{ inputs.release_tag }}" --json isDraft,name,tagName >/dev/null'
                  - name: Install dependencies
                    run: pnpm install --frozen-lockfile
                  - name: Build standalone package
                    shell: bash
                    run: "pnpm --filter \"./packages/stk\" run build\npnpm --filter \"./packages/erpc\" run build\npnpm --filter \"./packages/app\" run build:standalone\npnpm --dir packages/polywise run build:standalone"
                  - name: Publish polywise
                    shell: bash
                    working-directory: packages/polywise
                    env:
                          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
                    run: pnpm publish --access public --no-git-checks --provenance
