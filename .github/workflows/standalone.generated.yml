name: Publish NPM Package
'on':
      workflow_call:
            inputs:
                  release_version:
                        required: true
                        type: string
                        description: Resolved release version
                  release_commit:
                        required: true
                        type: string
                        description: Release commit persisted to the repository
                  release_tag:
                        required: true
                        type: string
                        description: Resolved release tag
concurrency:
      group: 'publish-npm-${{ github.run_id }}'
      cancel-in-progress: false
permissions:
      contents: read
      id-token: write
jobs:
      publish:
            runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v5
                    with:
                          fetch-depth: 0
                          ref: '${{ inputs.release_commit }}'
                  - uses: actions/setup-node@v4
                    with:
                          node-version: lts/*
                          cache: pnpm
                          cache-dependency-path: pnpm-lock.yaml
                          registry-url: https://npmjs.org
                  - name: Setup pnpm
                    uses: pnpm/action-setup@v4
                    with:
                          run_install: false
                  - name: Setup Bun
                    uses: oven-sh/setup-bun@v2
                  - name: Verify draft release exists
                    shell: bash
                    env:
                          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
                    run: 'gh release view "${{ inputs.release_tag }}" --json isDraft,name,tagName >/dev/null'
                  - name: Install dependencies
                    run: pnpm install --frozen-lockfile
                  - name: Upgrade npm
                    run: npm install -g npm@latest
                  - name: Build standalone package
                    shell: bash
                    run: "pnpm --filter \"./packages/stk\" run build\npnpm --filter \"./packages/erpc\" run build\npnpm --filter \"./packages/app\" run build:standalone\npnpm --dir packages/polywise run build:standalone"
                  - name: Publish polywise
                    shell: bash
                    working-directory: packages/polywise
                    run: npm publish --access public --provenance --no-git-checks
