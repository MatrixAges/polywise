<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link id="favicon" rel="icon" type="image/svg+xml" href="/icon.svg" />
		<link rel="stylesheet" href="/styles/init.css" />
		<link rel="stylesheet" href="/styles/icon_font.css" />
		<link rel="stylesheet" href="/icons/style.css" />

		<script type="module">
			if (window.$shell?.type === 'electron') {

				const res = await window.$shell.getEnv()

				window.$env = res
			}

	</body>
