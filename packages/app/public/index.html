<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link id="favicon" rel="icon" type="image/svg+xml" href="./icon.svg" />
		<link rel="stylesheet" href="./styles/init.css" />
		<link rel="stylesheet" href="./styles/icon_font.css" />
		<link rel="stylesheet" href="./icons/style.css" />

		<script type="module">
			const local_theme_source = localStorage.getItem('theme_source')
			const theme_source = local_theme_source ? JSON.parse(local_theme_source).value : 'light'
			const theme_match_media = window.matchMedia('(prefers-color-scheme: dark)')
			const system_theme_value = theme_match_media.matches ? 'dark' : 'light'
			const theme_value = theme_source === 'system' ? system_theme_value : theme_source

			document.documentElement.setAttribute('data-theme', theme_value)
			document.documentElement.style.colorScheme = theme_value
		</script>

		<script type="module">
			if (window.$shell?.type === 'electron') {
				setTimeout(() => window.$shell?.stopLoading(), 300)
			}
		</script>
	</head>
	<body>
		<div id="root"></div>
	</body>
</html>
