<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<style>
			[data-theme='dark'] {
				body {
					background-color: #060606;
				}

				._loading_wrap .logo {
					fill: white;
				}
			}

			body {
				background-color: #fafafa;
			}

			._loading_wrap {
				position: fixed;
				top: 0;
				left: 0;
				z-index: 1000;
				display: flex;
				overflow: hidden;
				align-items: center;
				justify-content: center;
				width: 100%;
				height: 100%;
				border-radius: 12px;
				-webkit-app-region: drag;
			}

			._loading_wrap .logo_wrap {
				width: 150px;
			}

			._loading_wrap .logo {
				fill: black;
			}
		</style>
	</head>

	<body>
		<div class="_loading_wrap">
			<div class="logo_wrap">
				<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 390 390">
					<path
						class="logo"
						d="M135,195h60a0,0,0,0,1,0,0V315a0,0,0,0,1,0,0H135a60,60,0,0,1-60-60v0A60,60,0,0,1,135,195Z"
					/>
					<path
						class="logo"
						d="M195,75h60a60,60,0,0,1,60,60v0a60,60,0,0,1-60,60H195a0,0,0,0,1,0,0V75A0,0,0,0,1,195,75Z"
					/>
				</svg>
			</div>
		</div>
	</body>
</html>
